rootProject.name = 'android'

include ':app'

def nodeModulesDir = new File(rootDir, '../node_modules')

include ':capacitor-android'
project(':capacitor-android').projectDir = new File(nodeModulesDir, '@capacitor/android/capacitor')

include ':capacitor-app'
project(':capacitor-app').projectDir = new File(nodeModulesDir, '@capacitor/app/android')

include ':capacitor-local-notifications'
project(':capacitor-local-notifications').projectDir = new File(nodeModulesDir, '@capacitor/local-notifications/android')

include ':capacitor-splash-screen'
project(':capacitor-splash-screen').projectDir = new File(nodeModulesDir, '@capacitor/splash-screen/android')

include ':capacitor-status-bar'
project(':capacitor-status-bar').projectDir = new File(nodeModulesDir, '@capacitor/status-bar/android')

include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File(rootDir, 'capacitor-cordova-android-plugins')